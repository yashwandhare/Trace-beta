syntax = "proto3";

package com.google.ai.edge.gallery.proto;

option java_package = "com.google.ai.edge.gallery.proto";
option java_outer_classname = "MemoryStoreOuter";
option java_multiple_files = true;

// How a memory entry came to exist. Drives UI affordances: USER_AUTHORED entries
// are freely editable/deletable; SYSTEM_AUTHORED entries were generated by Trace
// (e.g. from a scanned prescription) and are shown with their origin.
enum MemoryKind {
  MEMORY_KIND_UNSPECIFIED = 0;
  USER_AUTHORED = 1;
  SYSTEM_AUTHORED = 2;
}

// Where a SYSTEM_AUTHORED entry was derived from. UNSPECIFIED for user-authored
// entries. Lets the UI attribute the memory ("from a Vision scan") and lets
// wiring code find entries it created.
enum MemorySource {
  MEMORY_SOURCE_UNSPECIFIED = 0;
  MEMORY_SOURCE_MANUAL = 1;
  MEMORY_SOURCE_VISION_PRESCRIPTION = 2;
  MEMORY_SOURCE_CHAT_DOCUMENT = 3;
}

// A single memory entry — a fact, note, or reminder-backing record that Trace
// keeps for the user. Reminders link to a scheduled notification via
// linked_schedule_id (see scheduled_notification.proto); a plain note leaves it
// empty.
// Next ID: 9
message MemoryEntry {
  // Stable unique identifier (UUID string). Also used as the linked schedule id
  // when this entry backs a reminder, so the two stores stay in sync.
  string id = 1;
  // How this entry was created.
  MemoryKind kind = 2;
  // Where a system-authored entry came from (UNSPECIFIED for user-authored).
  MemorySource source = 3;
  // Short human-readable title shown in the list.
  string title = 4;
  // Longer free-text body / details.
  string body = 5;
  // The scheduled-notification id this entry backs, if it is a reminder;
  // empty for plain notes.
  string linked_schedule_id = 6;
  // Creation time, milliseconds since epoch.
  int64 created_at_ms = 7;
  // Last-update time, milliseconds since epoch.
  int64 updated_at_ms = 8;
}

// The persisted set of all memory entries.
// Next ID: 2
message MemoryStore {
  repeated MemoryEntry entry = 1;
}
